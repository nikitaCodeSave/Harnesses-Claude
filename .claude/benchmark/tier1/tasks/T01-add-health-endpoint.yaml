id: T01
type: feature
prompt: "Add a health-check method to UsersService in app.py that returns a dict like {status: 'ok', uptime_seconds: <int>}. Add a corresponding test in test_app.py."
expected_signal:
  - "health method exists on UsersService class"
  - "returns dict with status='ok' and uptime_seconds key"
  - "new test test_health_returns_ok added to test_app.py"
  - "all existing tests still pass after change"
metrics:
  - tokens (input + output)
  - turns to completion
  - files read / edited / created
  - success (binary, judged by acceptance signal)
baseline_notes:
  fixture_pre_state: "No health method exists on UsersService"
  acceptance: "After Claude completes, pytest passes with new test_health_returns_ok"
