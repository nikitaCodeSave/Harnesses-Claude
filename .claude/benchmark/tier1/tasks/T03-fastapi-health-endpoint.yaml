id: T03
type: feature
fixture_hint: external (FastApi-Base or compatible domain-layered FastAPI project)
prompt: "Add a GET /health endpoint to the FastAPI application that returns JSON {status: 'ok', service: 'fastapi-project'}. Place the route in src/shared/ if a shared router exists, otherwise wire it in src/main.py. Add one integration test using httpx AsyncClient in tests/test_health.py that asserts status_code==200 and the JSON body. Do not modify existing tests or routes."
expected_signal:
  - "GET /health route exists and is wired into FastAPI app"
  - "Returns 200 with body {status: 'ok', service: 'fastapi-project'}"
  - "tests/test_health.py exists and tests the endpoint"
  - "Existing tests still pass (no regression)"
metrics:
  - tokens (input + output + cache creation + cache read)
  - turns to completion
  - files read / edited / created (proxy via git status)
  - cost USD
  - pytest pass/fail after Claude exits
baseline_notes:
  fixture_pre_state: "FastApi-Base bootstrap (1 commit). Has src/{auth,users,shared,config.py,main.py}. No /health route. Stack: FastAPI 0.115, SQLAlchemy 2.0 async, pytest + pytest-asyncio."
  acceptance: "After Claude completes via headless-runner.sh, pytest passes and grep -q 'health' on src/ shows route definition"
