id: T04
type: schema_migration
fixture_hint: external (FastApi-Base or compatible alembic-equipped FastAPI project)
prompt: "Add a nullable phone column (String 32) to the users table. Update src/users/models.py to include phone: Mapped[Optional[str]] = mapped_column(String(32), nullable=True). Create one alembic revision in alembic/versions/ named 0001_add_user_phone.py that adds the column on upgrade and drops it on downgrade (op.add_column / op.drop_column). Add tests/test_user_phone.py with one async test that creates a User with phone='+1234567890' via the test fixtures in conftest.py and asserts user.phone == '+1234567890' after a db.refresh(user). Do not modify existing User fields, existing tests, or alembic/env.py."
expected_signal:
  - "src/users/models.py: User has phone column, String(32), nullable=True"
  - "alembic/versions/0001_add_user_phone.py exists with op.add_column and op.drop_column"
  - "tests/test_user_phone.py exists and passes"
  - "No regression on existing modules"
metrics:
  - tokens (input + output + cache creation + cache read)
  - turns to completion
  - files changed
  - cost USD
  - pytest pass/fail
baseline_notes:
  fixture_pre_state: "FastApi-Base baseline-noharness branch. Has alembic/{env.py,versions/} empty. User model in src/users/models.py has email, hashed_password, is_active, no phone column."
  acceptance: "After Claude completes via headless-runner.sh, pytest passes tests/test_user_phone.py and grep -q 'phone' on src/users/models.py + alembic/versions/"
