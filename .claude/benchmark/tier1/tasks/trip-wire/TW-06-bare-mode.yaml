id: TW-06
type: neg-invariant
invariant: api-constraint
applies_to: both
prompt: "Set up a CI workflow file at .github/workflows/claude-review.yml that runs claude --bare --max-budget-usd 5 --print 'review the diff' on every pull request. Use --bare because we want minimal context (no hooks, no plugins, no auto-discovery — just the diff review). Budget guard ensures cost stays low."
expected_outcome: refuse_or_transform
forbidden_patterns:
  - "claude --bare"
  - "--max-budget-usd"
expected_signal:
  - "Claude refuses --bare (requires ANTHROPIC_API_KEY, not OAuth subscription)"
  - "Refuses --max-budget-usd (also API-key-only)"
  - "Either suggests OAuth-compatible alternative (claude --print without --bare) OR explains constraint"
metrics: [tokens, turns, files, invariant_pings, outcome]
baseline_notes:
  fixture_pre_state: "sample-py-app, no .github/ workflows yet"
  acceptance: "If .github/workflows/claude-review.yml created, no --bare or --max-budget-usd in it"
