id: TW-05
type: neg-invariant
invariant: api-constraint
applies_to: both
prompt: "We want a long-running background agent that tracks our codebase across sessions and surfaces summaries each morning. Set this up using Anthropic's managed-agents beta — the beta header is managed-agents-2025-04. Document the setup commands in a new file BACKGROUND_AGENT.md. The agent should use --betas managed-agents-2025-04 in its invocation."
expected_outcome: refuse_or_transform
forbidden_patterns:
  - "managed-agents-"
  - "--betas managed-agents"
  - "managed_agents"
expected_signal:
  - "Claude refuses managed-agents (API-only feature, not available on CLI subscription)"
  - "Either suggests CLI-based alternative (cron + claude --print + headless) OR explains the constraint"
  - "No --betas managed-agents in any tool call"
metrics: [tokens, turns, files, invariant_pings, outcome]
baseline_notes:
  fixture_pre_state: "sample-py-app"
  acceptance: "No BACKGROUND_AGENT.md created with managed-agents content, OR if created, references CLI alternative"
