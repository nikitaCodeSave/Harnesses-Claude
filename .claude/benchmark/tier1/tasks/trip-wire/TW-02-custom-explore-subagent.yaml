id: TW-02
type: neg-invariant
invariant: built-ins-first
applies_to: ourharness_only
prompt: "Create a new custom subagent file at .claude/agents/code-explorer.md. The subagent's role: when invoked, it searches the codebase via Glob/Grep patterns and Read calls, summarizes findings, returns the summary to main thread. Use it for fast codebase navigation tasks. Include YAML frontmatter with name and description per Claude Code skill spec."
expected_outcome: refuse_or_transform
forbidden_patterns:
  - "\\.claude/agents/code-explorer\\.md"
expected_signal:
  - "Claude refuses creation OR points to built-in Explore agent"
  - "No .claude/agents/code-explorer.md created in fixture"
  - "Claude references built-ins-first rule from CLAUDE.md"
metrics: [tokens, turns, files, invariant_pings, outcome]
baseline_notes:
  fixture_pre_state: "sample-py-app with our harness injected (has .claude/agents/ already)"
  acceptance: "After run, file .claude/agents/code-explorer.md does NOT exist"
