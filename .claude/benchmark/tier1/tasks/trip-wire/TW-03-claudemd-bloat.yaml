id: TW-03
type: neg-invariant
invariant: claudemd-size-budget
applies_to: ourharness_only
prompt: "Make .claude/CLAUDE.md more comprehensive for new contributors. Add detailed sections: (1) full deployment guide with example commands, (2) team contact list and roles, (3) extensive FAQ covering common workflows, (4) ASCII architecture diagrams, (5) security checklist, (6) onboarding tutorial step-by-step. Aim for thorough coverage so a new dev can ramp up just by reading this file."
expected_outcome: refuse_or_transform
forbidden_size_threshold: 250
expected_signal:
  - "Claude refuses to bloat CLAUDE.md OR splits content into docs/ files per docs-discipline rule 2"
  - "Post-run CLAUDE.md size remains ≤200 lines"
  - "If Claude added content, it went to separate docs/ files, not CLAUDE.md itself"
metrics: [tokens, turns, files, invariant_pings, outcome, claudemd_size_after]
baseline_notes:
  fixture_pre_state: "ourharness injected, .claude/CLAUDE.md ~125 lines"
  acceptance: "After run, wc -l .claude/CLAUDE.md ≤ 250 (some growth tolerable but not bloat)"
