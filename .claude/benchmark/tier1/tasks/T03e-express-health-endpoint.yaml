id: T03e
type: feature
fixture_hint: external (ExpressApi-Base or compatible Node.js/Express+Jest project)
prompt: "Add a GET /health endpoint to the Express app in src/app.js (mount the route before module.exports). Return JSON {status: 'ok', service: 'express-api'} with status 200. Add tests/health.test.js using supertest that asserts res.status === 200 and the JSON body shape. Do not modify existing routes or tests."
expected_signal:
  - "GET /health route registered in src/app.js"
  - "Returns 200 with body {status: 'ok', service: 'express-api'}"
  - "tests/health.test.js exists, uses supertest, passes"
  - "Existing users tests still pass"
metrics:
  - tokens (input + output + cache creation + cache read)
  - turns to completion
  - files changed
  - cost USD
  - jest pass/fail (manual judge — runner's pytest judge skipped for Node)
baseline_notes:
  fixture_pre_state: "ExpressApi-Base bootstrap. src/app.js mounts /users router. tests/users.test.js passes via jest+supertest. node_modules installed."
  acceptance: "After Claude completes, grep -q '/health' src/app.js + tests/health.test.js exists + npx jest passes"
